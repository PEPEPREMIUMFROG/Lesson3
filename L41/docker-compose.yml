version: '3.8'

services:
  postgres:
    image: postgres:15-alpine3.21
    container_name: library_db
    environment:
      POSTGRES_DB: l41db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library"]
      interval: 1s
      timeout: 1s
      retries: 5

volumes:
  postgres_data: