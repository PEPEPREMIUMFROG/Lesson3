
services:
  postgres-db:
    image: postgres:15
    container_name: hibernate_student_db
    environment:
      POSTGRES_DB: l38db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  postgres_data: